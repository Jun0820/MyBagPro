<!-- 
  My Bag Pro: AI Golf Ball Diagnosis
  Page 2: Chat UI
  Paste this into an Elementor "HTML Widget".
-->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Noto Sans JP', 'sans-serif'],
          eng: ['Montserrat', 'sans-serif'],
        },
        animation: {
          'slideIn': 'slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
        },
        keyframes: {
          slideIn: {
            '0%': { opacity: '0', transform: 'translateX(20px)' },
            '100%': { opacity: '1', transform: 'translateX(0)' },
          }
        }
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<div class="min-h-screen bg-slate-900 text-white font-sans selection:bg-cyan-500/30 overflow-hidden relative">
  <!-- Background decorations -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-600/20 blur-[120px] rounded-full mix-blend-screen"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-600/20 blur-[120px] rounded-full mix-blend-screen"></div>
  </div>

  <div class="relative z-10 w-full max-w-md mx-auto min-h-screen flex flex-col p-6 animate-slideIn">
    <!-- Progress Bar -->
    <div class="w-full pt-8 pb-12">
      <div class="flex justify-between text-xs text-slate-400 mb-2 font-bold font-eng">
        <span id="progress-text-current">01</span>
        <span id="progress-text-total">04</span>
      </div>
      <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 transition-all duration-500 ease-out" style="width: 25%"></div>
      </div>
    </div>

    <!-- Main Question Area -->
    <div class="flex-1 flex flex-col pt-4">
      <h2 id="question-title" class="text-2xl font-bold mb-2 tracking-tight transition-opacity duration-300"></h2>
      <p id="question-subtitle" class="text-slate-400 text-sm mb-8 transition-opacity duration-300"></p>

      <!-- Options List -->
      <div id="options-container" class="space-y-3">
        <!-- Options injected here by JS -->
      </div>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();

  // Configuration
  // IMPORTANT: Set this to the URL of your Result page in WordPress
  const RESULT_PAGE_URL = '/ball-diagnosis/result/'; 

  const QUESTIONS = [
    {
      id: 'score',
      title: '現在の平均スコアは？',
      subtitle: 'ハンディキャップの目安として',
      options: [
        { value: 'under80', label: '80未満', desc: 'プロ・トップアマレベル' },
        { value: '80s', label: '80台', desc: 'シングル〜上級者レベル' },
        { value: '90s', label: '90台', desc: 'アベレージゴルファー' },
        { value: 'over100', label: '100以上', desc: 'エンジョイゴルファー' },
      ]
    },
    {
      id: 'headSpeed',
      title: '平均ヘッドスピードは？',
      subtitle: 'ドライバーでの計測値',
      options: [
        { value: 'under40', label: '40m/s未満', desc: 'ゆったりとしたスイング' },
        { value: '40-43', label: '40〜43m/s', desc: '一般的なアマチュア層' },
        { value: '44-47', label: '44〜47m/s', desc: 'アスリート志向' },
        { value: '48-49', label: '48〜49m/s', desc: 'ハードヒッター' },
        { value: 'over50', label: '50m/s以上', desc: 'プロ・ドラコンレベル' },
      ]
    },
    {
      id: 'concern',
      title: '最も解決したい悩みは？',
      subtitle: '理想のボールに求める性能',
      options: [
        { value: 'distance', label: '飛距離アップ', desc: 'とにかく前に飛ばしたい' },
        { value: 'spin', label: 'スピン・コントロール', desc: 'グリーンでピタッと止めたい' },
        { value: 'feel', label: '打感の柔らかさ', desc: 'フェースに乗る感触重視' },
        { value: 'stability', label: '曲がり幅の軽減', desc: 'サイドスピンを抑制したい' },
      ]
    },
    {
      id: 'trajectory',
      title: '現在の持ち球は？',
      subtitle: '自然に出る球筋',
      options: [
        { value: 'draw', label: 'ドロー', desc: '右から左に曲がる' },
        { value: 'fade', label: 'フェード', desc: '左から右に曲がる' },
        { value: 'straight', label: 'ストレート', desc: 'まっすぐ飛ぶ' },
        { value: 'slice', label: 'スライス', desc: '右に大きく曲がる' },
        { value: 'hook', label: 'フック', desc: '左に大きく曲がる' },
      ]
    }
  ];

  let currentStep = 0;
  let answers = {};

  const titleEl = document.getElementById('question-title');
  const subtitleEl = document.getElementById('question-subtitle');
  const containerEl = document.getElementById('options-container');
  const progTextCurrent = document.getElementById('progress-text-current');
  const progTextTotal = document.getElementById('progress-text-total');
  const progBar = document.getElementById('progress-bar');

  function renderQuestion() {
    const q = QUESTIONS[currentStep];
    
    // Update Progress
    progTextCurrent.innerText = `0${currentStep + 1}`;
    progTextTotal.innerText = `0${QUESTIONS.length}`;
    progBar.style.width = `${((currentStep + 1) / QUESTIONS.length) * 100}%`;

    // Update Text (Fade effect)
    titleEl.style.opacity = 0;
    subtitleEl.style.opacity = 0;
    containerEl.style.opacity = 0;
    
    setTimeout(() => {
      titleEl.innerText = q.title;
      subtitleEl.innerText = q.subtitle;
      
      let html = '';
      q.options.forEach((opt, idx) => {
        html += `
          <button onclick="handleSelect('${opt.value}')" 
            class="w-full group relative flex items-center justify-between p-5 rounded-2xl text-left transition-all duration-200 active:scale-95 bg-slate-800/40 border-slate-700/50 hover:bg-slate-800 hover:border-slate-600 border backdrop-blur-md"
            style="animation: slideIn 0.3s ease forwards ${idx * 0.1}s; opacity: 0; transform: translateY(10px);"
          >
            <div>
              <div class="font-bold text-lg mb-1 text-slate-200 group-hover:text-cyan-400 transition-colors">
                ${opt.label}
              </div>
              <div class="text-xs text-slate-400">
                ${opt.desc}
              </div>
            </div>
            
            <div class="w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 bg-slate-700/50 text-slate-400 group-hover:bg-cyan-500 group-hover:text-white shadow-none group-hover:shadow-[0_0_10px_rgba(34,211,238,0.5)]">
              <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </div>
          </button>
        `;
      });
      containerEl.innerHTML = html;
      lucide.createIcons();
      
      titleEl.style.opacity = 1;
      subtitleEl.style.opacity = 1;
      containerEl.style.opacity = 1;
    }, 200);
  }

  window.handleSelect = function(value) {
    const q = QUESTIONS[currentStep];
    answers[q.id] = value;

    // Visual feedback on the selected button
    const buttons = containerEl.querySelectorAll('button');
    buttons.forEach(btn => {
      if (btn.getAttribute('onclick').includes(value)) {
        btn.classList.add('bg-slate-800/80', 'border-cyan-500/50', 'shadow-[0_0_15px_rgba(34,211,238,0.2)]');
        btn.classList.remove('bg-slate-800/40', 'border-slate-700/50', 'hover:bg-slate-800');
        btn.querySelector('.text-slate-200').classList.replace('text-slate-200', 'text-cyan-400');
        btn.querySelector('.bg-slate-700\\/50').className = 'w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 bg-cyan-500 text-white shadow-[0_0_10px_rgba(34,211,238,0.5)]';
      } else {
        btn.style.opacity = 0.5;
        btn.style.pointerEvents = 'none';
      }
    });

    setTimeout(() => {
      if (currentStep < QUESTIONS.length - 1) {
        currentStep++;
        renderQuestion();
      } else {
        // Complete! Save answers and redirect
        sessionStorage.setItem('mybagpro_answers', JSON.stringify(answers));
        window.location.href = RESULT_PAGE_URL;
      }
    }, 400); // Wait for transition
  };

  // Initialize
  renderQuestion();
</script>

<style>
  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
