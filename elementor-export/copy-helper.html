    // Map labels
    const concernLabel = answers.concern === 'distance' ? '飛距離' : answers.concern === 'spin' ? 'スピン' : answers.concern === 'stability' ? '安定性' : '打感';
    const trajLabel = answers.trajectory === 'draw' ? 'ドロー' : answers.trajectory === 'fade' ? 'フェード' : answers.trajectory === 'slice' ? 'スライス' : answers.trajectory === 'hook' ? 'フック' : 'ストレート';
    const concernSol = answers.concern === 'distance' ? '高初速帯での伸びがカギ。' : answers.concern === 'spin' ? '高スピンでグリーンを攻略。' : answers.concern === 'stability' ? 'サイドスピン抑制がカギ。' : 'ソフトな打感で繊細なタッチを。';
    
    // Inject DOM
    document.getElementById('res-img').src = result.ball.img;
    document.getElementById('res-match').innerText = `${result.matchScore}% MATCH`;
    document.getElementById('res-profileLabel').innerText = `HS ${answers.headSpeed || '40-43'}m/s / ${answers.score === 'under80' ? 'トップレベル' : answers.score === '80s' ? '上級者' : answers.score === '90s' ? 'プレーヤー' : 'エンジョイゴルファー'}の為の最適解`;
    document.getElementById('res-name').innerText = result.ball.name;
    document.getElementById('res-type').innerText = result.ball.type;
    document.getElementById('res-desc').innerText = result.ball.desc;
    
    document.getElementById('res-dist').innerText = `LV.${result.ball.radar.distance}`;
    document.getElementById('res-spin').innerText = `LV.${result.ball.radar.spin}`;
    document.getElementById('res-feel').innerText = `LV.${result.ball.radar.feel}`;

    document.getElementById('res-summary').innerText = `「${concernLabel}」を重視し、「${trajLabel}」軌道で攻めるスタイル。${concernSol}`;

    // 4. Animate Out Loading & Show Results
    setTimeout(() =&gt; {
      document.getElementById('loading-view').style.opacity = '0';
      setTimeout(() =&gt; {
        document.getElementById('loading-view').classList.add('hidden');
        document.getElementById('result-view').classList.remove('hidden');
        document.getElementById('result-view').classList.add('flex');
        
        // Trigger fade in layout
        setTimeout(() =&gt; {
          document.getElementById('result-view').style.opacity = '1';
          
          // Trigger card slide up
          setTimeout(() =&gt; {
            const card = document.getElementById('card-element');
            card.classList.remove('translate-y-8', 'opacity-0', 'scale-95');
            card.classList.add('translate-y-0', 'opacity-100', 'scale-100');
          }, 100);
        }, 50);
      }, 500);
    }, 3500); // 3.5s fake loading
  });

  // 5. Native Share API & HTML2Canvas Logic
  let isSharing = false;
  
  window.handleShare = async function() {
    if (isSharing) return;
    isSharing = true;

    const btnShare = document.getElementById('btn-share');
    const shareContent = document.getElementById('share-content');
    const cardRef = document.getElementById('card-element');

    // UI Loading State
    btnShare.classList.remove('bg-[#1DA1F2]', 'hover:bg-[#1a8cd8]');
    btnShare.classList.add('bg-slate-700', 'cursor-not-allowed', 'opacity-80');
    shareContent.innerHTML = `&lt;div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"&gt;&lt;/div&gt; 画像を生成中...`;

    try {
      // Allow browser to flush UI state
      await new Promise(r =&gt; setTimeout(r, 100));

      const canvas = await html2canvas(cardRef, {
        scale: 2,
        backgroundColor: '#0f172a',
        logging: false,
        useCORS: true, 
      });

      canvas.toBlob(async (blob) =&gt; {
        if (!blob) throw new Error('Failed to generate image');

        const file = new File([blob], 'mybagpro-diagnosis.png', { type: 'image/png' });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: 'My Bag Pro 診断結果',
            text: `AIが選んだ運命のボールは【${result.ball.name}】でした！ #MyBagPro #ゴルフボール診断 #ゴルフギア`,
            files: [file],
          });
        } else {
          // Fallback Download
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'mybagpro-diagnosis.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          alert('結果画像をダウンロードしました。SNSに添付してシェアしてください！');
        }
      }, 'image/png');

    } catch (error) {
      console.error('Sharing failed:', error);
      alert('画像の生成に失敗しました。ページをリロードして再試行してください。');
    } finally {
      // Revert UI State
      isSharing = false;
      btnShare.classList.remove('bg-slate-700', 'cursor-not-allowed', 'opacity-80');
      btnShare.classList.add('bg-[#1DA1F2]', 'hover:bg-[#1a8cd8]');
      shareContent.innerHTML = `&lt;i data-lucide="share-2" class="w-5 h-5"&gt;&lt;/i&gt; 結果をシェア・保存する`;
      lucide.createIcons();
    }
  };
&lt;/script&gt;
