<!-- 
  My Bag Pro: AI Golf Ball Diagnosis
  Page 1: Landing Screen
  Note: This is pure HTML with Tailwind CSS via CDN.
  Paste this into an Elementor "HTML Widget".
-->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Noto Sans JP', 'sans-serif'],
          eng: ['Montserrat', 'sans-serif'],
        },
        animation: {
          'fadeIn': 'fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
        },
        keyframes: {
          fadeIn: {
            '0%': { opacity: '0', transform: 'translateY(10px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          }
        }
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Icon Library (Lucide alternative) -->
<script src="https://unpkg.com/lucide@latest"></script>

<div class="min-h-screen bg-slate-900 text-white font-sans selection:bg-cyan-500/30 overflow-hidden relative">
  <!-- Background decorations -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-600/20 blur-[120px] rounded-full mix-blend-screen"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-600/20 blur-[120px] rounded-full mix-blend-screen"></div>
  </div>

  <div class="relative z-10 w-full max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-6 animate-fadeIn">
    <div class="flex-1 flex flex-col items-center justify-center w-full max-w-sm mx-auto text-center space-y-8">
      
      <!-- Logo Section -->
      <div class="space-y-2">
        <div class="inline-block relative">
          <div class="absolute inset-0 bg-cyan-400/20 blur-xl rounded-full"></div>
          <h1 class="relative font-eng text-5xl font-black tracking-tight text-white drop-shadow-lg">
            My Bag <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">Pro</span>
          </h1>
        </div>
        <div class="h-px w-16 bg-gradient-to-r from-transparent via-slate-500 to-transparent mx-auto mt-4 mb-2"></div>
        <p class="text-slate-300 font-medium tracking-widest text-xs uppercase">AI Golf Ball Diagnosis</p>
      </div>

      <!-- Hero Copy -->
      <div class="space-y-4 pt-4">
        <h2 class="text-2xl font-bold leading-tight">
          あなたのスイングに、<br />
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">プロの選択を。</span>
        </h2>
        <p class="text-slate-400 text-sm leading-relaxed">
          プレースタイルを選択するだけで、<br />
          AIがあなたに最適なツアーボールを導き出します。
        </p>
      </div>

      <!-- Action Button -->
      <div class="w-full pt-8">
        <!-- LINK DESTINATION: Update this href to your Elementor Chat page URL -->
        <a href="/ball-diagnosis/chat/" class="group relative w-full flex items-center justify-center gap-3 py-4 px-8 rounded-2xl bg-gradient-to-r from-cyan-500 to-emerald-500 text-white font-bold text-lg shadow-[0_0_20px_rgba(34,211,238,0.4)] hover:shadow-[0_0_30px_rgba(34,211,238,0.6)] active:scale-95 transition-all duration-200 overflow-hidden text-decoration-none">
          <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
          <span class="relative z-10">診断をスタート（無料）</span>
          <i data-lucide="arrow-right" class="relative z-10 w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
        </a>
        
        <p class="mt-4 text-xs text-slate-500 font-medium">所要時間: 約30秒 / 登録不要</p>
      </div>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();
</script>
